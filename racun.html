                <p class="overlay-title">Apa yang ingin kamu lakukan?</p>

                <div class="overlay-buttons">
                    <button class="overlay-button choice-trigger"
                     data-hover="asset/Racun 1 Hover.png"
                     data-idle="asset/Racun 2 Idle_1.png"
                     data-text="Meski kutu kucing dan anjing terlihat mirip, obat kutu anjing tidak bisa sembarangan dipakai untuk kucing! Obat kutu anjing mengandung zat bernama Permethrin yang berbahaya bagi kucing. Sistem metabolisme kucing sangat unik, sehingga bahkan kontak kecil sekalipun — seperti bergesekan dengan anjing yang baru diobati — sudah bisa menimbulkan reaksi yang fatal. Jadi, selalu gunakan obat sesuai label hewannya masing-masing ya, kecuali sudah ada rekomendasi langsung dari dokter hewanmu!"
                     data-video="render2/Story 3 Good 1.mp4"
                     data-choice="choice1"
                     data-verdict="BETUL!"
                     data-verdict-color="green"
                     data-explain1="image/image1.png"
                     data-explain2="image/image2.png"
                     data-source="Sumber: <br> 1. International Cat Care; Permethrin Poisoning <br> 2. Feline Emergency and Critical Care Second Edition; Toxicological Emergency">
                        <img src="asset/Racun 2 Idle_1.png">
                    </button>

                    <button class="overlay-button choice-trigger"
                    data-hover="asset/Racun 2 Hover.png"
                    data-idle="asset/Racun 2 Idle.png"
                    data-text="Meski kutu kucing dan anjing terlihat mirip, obat kutu anjing tidak bisa sembarangan dipakai untuk kucing! Obat kutu anjing mengandung zat bernama Permethrin yang berbahaya bagi kucing. Sistem metabolisme kucing sangat unik, sehingga bahkan kontak kecil sekalipun — seperti bergesekan dengan anjing yang baru diobati — sudah bisa menimbulkan reaksi yang fatal. Gejala keracunan Permethrin yang ringan bisa terlihat seperti tremor, gemetar, sensitif berlebihan terhadap sentuhan dan suara, hingga kehilangan kendali tubuh. Dan semakin parah gejalanya, semakin kecil peluang kucing untuk bertahan — jadi jangan sampai ditunda! Kalau kamu curiga kucingmu keracunan, bawa juga barang yang dicurigai sebagai penyebabnya dalam wadah tertutup ke dokter hewan. Ini akan sangat membantu mereka dalam menentukan penanganan yang tepat!"
                    data-video="render2/Story 3 Branch.mp4"
                    data-choice="choice2"
                    data-verdict="SALAH!"
                    data-verdict-color="red"
                    data-explain1="image/image1.png"
                    data-explain2="image/image2.png"
                    data-source="Sumber: <br> 1. International Cat Care; Permethrin Poisoning <br> 2. Feline Emergency and Critical Care Second Edition; Toxicological Emergency">

                <div class="overlay-buttons">
                    <button class="overlay-button branch-trigger"
                        data-hover="asset/Kejang 1 Hover.png"
                        data-idle="asset/Kejang 1 Idle.png"
                        data-text="Saat kucing kejang, coba lapisi area sekitarnya dengan handuk atau benda empuk lainnya untuk mencegah kucing terluka akibat terbentur benda keras. Penyebab kejang sendiri bisa dibagi menjadi dua kategori: yang berasal dari dalam otak, dan yang berasal dari luar otak. Kalau penyebabnya ada di otak, bisa jadi kucing memang memiliki epilepsi. Namun untuk kasus keracunan, kejang biasanya tidak akan berulang — kecuali kucing kembali terpapar racun yang sama. Apapun penyebabnya, kalau ini adalah pertama kali kucingmu mengalami kejang, segera bawa ke dokter hewan ya untuk mendapatkan diagnosa dan penanganan yang tepat!"
                        data-video="render2/Story 3 Good 2.mp4"

                        data-verdict-color="green"

                    </button>

                    <button class="overlay-button branch-trigger"
                        data-hover="asset/Kejang 2 Hover.png"
                        data-idle="asset/Kejang 2 Idle.png"
                        data-text="Saat kejang, kucing tidak bisa mengontrol gerakan tubuhnya and seringkali tidak sepenuhnya sadar — jadi kamu pun berisiko terluka kalau tidak hati-hati! Kalau terpaksa harus memegang atau mengamankan kucing yang sedang kejang, jauhkan tanganmu dari area mulutnya, karena gigitan kucing dalam kondisi ini bisa sangat kuat dan menyakitkan. Penyebab kejang sendiri bisa dibagi menjadi dua kategori: yang berasal dari dalam otak, dan yang berasal dari luar otak. Kalau penyebabnya ada di otak, bisa jadi kucing memang memiliki epilepsi. Namun untuk kasus keracunan, kejang biasanya tidak akan berulang — kecuali kucing kembali terpapar racun yang sama. Apapun penyebabnya, kalau ini adalah pertama kali kucingmu mengalami kejang, segera bawa ke dokter hewan ya untuk mendapatkan diagnosa dan penanganan yang tepat!"
